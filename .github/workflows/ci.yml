name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Test the supported floor (engines: >=20) and the current LTS-track
        # major. better-sqlite3 ships prebuilt binaries for both ABIs; pinning
        # to a single version is what previously broke local Node 24 dev.
        node-version: [20, 24]
    steps:
      - uses: actions/checkout@v4
      - name: Check AGENTS.md mirrors CLAUDE.md
        run: |
          # The two files are verbatim mirrors except the "you are here" marker
          # lines in the file-structure tree. Strip those two lines and diff.
          diff <(grep -vE '^├── (CLAUDE|AGENTS)\.md' CLAUDE.md) \
               <(grep -vE '^├── (CLAUDE|AGENTS)\.md' AGENTS.md)
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run format:check
      - run: npm run typecheck
      - run: npm run coverage
      - run: npm run build
